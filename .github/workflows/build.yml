name: Build

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x ./gradlew
      - run: ./gradlew build
      - uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: build/libs/

  deploy:
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x ./gradlew
      - name: Set version from release tag
        run: |
          TAG=${{ github.event.release.tag_name }}
          VERSION=${TAG#v}
          sed -i "s/^mod_version=.*/mod_version=$VERSION/" gradle.properties
          echo "MOD_VERSION=$VERSION" >> $GITHUB_ENV
      - run: ./gradlew build
      - name: Update Modrinth project description from README
        uses: funnyboy-roks/modrinth-auto-desc@v1.7
        with:
          auth-token: ${{ secrets.MODRINTH_TOKEN }}
          slug: ${{ vars.MODRINTH_ID }}
      - name: Get changelog entry for this version
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ env.MOD_VERSION }}
          path: ./CHANGELOG.md
      - uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_ID }}
          name: ${{ github.event.release.name }}
          version: ${{ env.MOD_VERSION }}
          changelog: ${{ steps.changelog.outputs.changes }}
          loaders: fabric
          game-versions: 1.21.1
          files: build/libs/patchwork-${{ env.MOD_VERSION }}.jar
          primary-file: patchwork-${{ env.MOD_VERSION }}.jar
