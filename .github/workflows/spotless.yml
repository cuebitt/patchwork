name: Spotless

on:
  push:
  pull_request:

jobs:
  spotless:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x ./gradlew
      - run: ./gradlew spotlessCheck
