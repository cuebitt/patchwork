name: Deploy to Modrinth

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Set version from release tag
        run: |
          TAG=${{ github.event.release.tag_name }}
          VERSION=${TAG#v}
          sed -i "s/^mod_version=.*/mod_version=$VERSION/" gradle.properties
          echo "MOD_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ vars.MODRINTH_ID }}
          name: ${{ github.event.release.name }}
          version: ${{ env.MOD_VERSION }}
          changelog: ${{ github.event.release.body }}
          loaders: fabric
          game-versions: 1.21.1
          files: build/libs/trowel-key-${{ env.MOD_VERSION }}.jar
          primary-file: trowel-key-${{ env.MOD_VERSION }}.jar
